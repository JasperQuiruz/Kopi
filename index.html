<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Instant PHP/Coin Converter</title>
    
    <link rel="manifest" href="manifest.json">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Coin Converter">
    <meta name="mobile-web-app-capable" content="yes">
    
    <link rel="apple-touch-icon" sizes="512x512" href="peso.png">
    <link rel="icon" type="image/png" sizes="512x512" href="peso.png">

    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            
            background-image: url('HD-wallpaper-lucky-clover-beautiful-green-life-love-luck-nature.jpg'); 
            background-size: cover;
            background-position: center center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            background-color: #1b5e20;

            position: fixed;
            left: 0;
            top: 0;
            -webkit-tap-highlight-color: transparent;
        }
        
        .calc-box { 
            background: rgba(255, 255, 255, 0.25); 
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            padding: 30px; 
            border-radius: 16px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.35); 
            text-align: center; 
            width: 320px;
            max-width: 90%;
            position: relative; 
            padding-top: 65px; 
            border: 1px solid rgba(255, 255, 255, 0.3);
            user-select: none;
            box-sizing: border-box;
        }
        
        .mode-btn {
            position: absolute;
            top: 15px;
            left: 20px;
            padding: 6px 14px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: bold;
            cursor: pointer;
            user-select: none;
            color: white;
            border: none;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            transition: background-color 0.2s ease;
        }
        
        .bg-green { background-color: #2e7d32; }
        .bg-green:hover { background-color: #1b5e20; }
        .bg-blue { background-color: #1a73e8; }
        .bg-blue:hover { background-color: #1557b0; }
        
        .settings-toggle {
            position: absolute;
            top: 16px;
            right: 22px;
            cursor: pointer;
            user-select: none;
            transition: transform 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .settings-toggle img {
            width: 24px;
            height: 24px;
            object-fit: contain;
        }
        .settings-toggle:hover {
            transform: scale(1.15) rotate(30deg);
        }
        
        .modal-overlay {
            display: none; 
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.55); 
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        
        .settings-panel {
            background: white;
            border-radius: 12px;
            padding: 24px;
            width: 260px;
            text-align: left;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.3);
            position: relative;
        }
        
        .close-btn {
            position: absolute;
            top: 12px;
            right: 16px;
            font-size: 18px;
            color: #8a8d91;
            cursor: pointer;
            font-weight: bold;
            user-select: none;
        }
        
        .settings-panel label {
            font-size: 11px;
            color: #65676b;
            margin-bottom: 8px;
            display: block;
            font-weight: 600;
            text-transform: uppercase;
        }
        .settings-panel input {
            font-size: 18px;
            padding: 8px;
            text-align: center;
            width: 100%;
            border: 2px solid #e4e6eb;
            border-radius: 6px;
            box-sizing: border-box;
            outline: none;
            margin-bottom: 15px;
        }

        .btn-save {
            width: 100%;
            padding: 10px 0;
            border-radius: 6px;
            font-size: 13px;
            font-weight: bold;
            cursor: pointer;
            border: none;
            text-align: center;
            text-transform: uppercase;
            background-color: #2e7d32;
            color: white;
        }

        .label-with-icon {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-bottom: 12px;
            width: 100%;
        }
        .label-with-icon img {
            width: 24px;
            height: 24px;
            object-fit: contain;
        }

        .result-label {
            font-size: 11px;
            color: #000000; 
            margin-bottom: 5px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            text-shadow: 0px 1px 1px rgba(255, 255, 255, 0.4);
        }
        
        .result { 
            font-size: 42px; 
            font-weight: 900; 
            color: #000000; 
            min-height: 52px; 
            line-height: 52px;
            margin-bottom: 5px;
            text-shadow: 0px 1px 3px rgba(255, 255, 255, 0.8);
        }
        .divider {
            height: 1px;
            background-color: rgba(0, 0, 0, 0.25);
            margin: 20px 0;
        }
        
        label.input-label { 
            font-size: 13px; 
            color: #000000; 
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            text-shadow: 0px 1px 1px rgba(255, 255, 255, 0.4);
            margin: 0;
        }
        .main-input { 
            font-size: 28px; 
            padding: 12px; 
            width: 100%; 
            text-align: center; 
            border: 2px solid rgba(0, 0, 0, 0.25); 
            border-radius: 8px; 
            box-sizing: border-box;
            outline: none;
            background: rgba(255, 255, 255, 0.8); 
            color: #000000;
            font-weight: 700;
        }
    </style>
</head>
<body>

<div class="calc-box">
    <button class="mode-btn bg-green" id="modeBtn" onclick="toggleMode()">
        PESO TO COIN
    </button>
    
    <span class="settings-toggle" onclick="openSettings()">
        <img src="settings.png" alt="Settings">
    </span>

    <div class="result-label" id="resLabel">COINS OUT (ROUNDED DOWN)</div>
    <div class="result" id="outputVal">0</div>
    
    <div class="divider"></div>
    
    <div class="label-with-icon">
        <img id="labelIcon" src="peso.png" alt="Icon">
        <label for="inputVal" class="input-label" id="inpLabel">Enter Pesos (PHP)</label>
    </div>
    
    <input type="text" inputmode="numeric" id="inputVal" class="main-input" placeholder="0" oninput="formatAndCalculate(this)" autofocus>
</div>

<div class="modal-overlay" id="modalOverlay">
    <div class="settings-panel">
        <span class="close-btn" onclick="closeSettings()">✕</span>
        <label for="divisorVal">Modify Divisor Rule:</label>
        <input type="number" id="divisorVal" value="62.6" step="0.1">
        
        <button class="btn-save" onclick="saveSettings()">Save Changes</button>
    </div>
</div>

<script>
let isPesoToCoin = true;
let activeDivisor = 62.6;

function openSettings() {
    document.getElementById('divisorVal').value = activeDivisor;
    document.getElementById('modalOverlay').style.display = 'flex';
}

function closeSettings() {
    document.getElementById('modalOverlay').style.display = 'none';
}

function saveSettings() {
    let inputDivisor = parseFloat(document.getElementById('divisorVal').value);
    if (!isNaN(inputDivisor) && inputDivisor !== 0) {
        activeDivisor = inputDivisor;
        calculate();
        closeSettings();
    } else {
        alert("Please enter a valid divisor number.");
    }
}

function toggleMode() {
    isPesoToCoin = !isPesoToCoin;
    
    let modeBtn = document.getElementById('modeBtn');
    let resLabel = document.getElementById('resLabel');
    let inpLabel = document.getElementById('inpLabel');
    let inputVal = document.getElementById('inputVal');
    let labelIcon = document.getElementById('labelIcon');
    
    if (isPesoToCoin) {
        modeBtn.className = "mode-btn bg-green";
        modeBtn.innerText = "PESO TO COIN";
        resLabel.innerText = "COINS OUT (ROUNDED DOWN)";
        inpLabel.innerText = "Enter Pesos (PHP)";
        labelIcon.src = "peso.png"; 
    } else {
        modeBtn.className = "mode-btn bg-blue";
        modeBtn.innerText = "COIN TO PESO";
        resLabel.innerText = "PESOS OUT (ROUNDED UP)";
        inpLabel.innerText = "Enter Coins";
        labelIcon.src = "dollar.png"; 
    }
    
    inputVal.value = "";
    calculate();
}

// Automatically processes the typed values to apply commas dynamically
function formatAndCalculate(input) {
    // Save current typing cursor position
    let cursorPosition = input.selectionStart;
    let originalLength = input.value.length;

    // Remove anything that isn't a digit
    let cleanValue = input.value.replace(/[^0-9]/g, '');
    
    if (cleanValue === '') {
        input.value = '';
        calculate();
        return;
    }

    // Convert to a formal number string with comma separators
    let formattedValue = parseInt(cleanValue, 10).toLocaleString('en-US');
    input.value = formattedValue;

    // Readjust the typing cursor so it doesn't jump around on mobile
    let newLength = formattedValue.length;
    input.setSelectionRange(cursorPosition + (newLength - originalLength), cursorPosition + (newLength - originalLength));

    calculate();
}

function calculate() {
    // Get input value and strip existing commas before calculating math
    let rawInputString = document.getElementById('inputVal').value.replace(/,/g, '');
    let x = parseFloat(rawInputString);
    let output = document.getElementById('outputVal');
    
    if (isNaN(x) || isNaN(activeDivisor) || activeDivisor === 0 || x <= 0) {
        output.innerText = "0";
        return;
    }
    
    let rawResult = 0;
    let finalResult = 0;
    
    if (isPesoToCoin) {
        rawResult = (x / activeDivisor) * 10000;
        finalResult = Math.floor(rawResult / 100) * 100;
    } else {
        rawResult = (x / 10000) * activeDivisor;
        finalResult = Math.ceil(rawResult);
    }
    
    output.innerText = finalResult.toLocaleString();
}

if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js')
            .then(reg => console.log('Offline mode ready.'))
            .catch(err => console.log('Service worker failed', err));
    });
}
</script>

</body>
</html>
