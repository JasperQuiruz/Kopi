<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instant PHP/Coin Converter</title>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            
            /* Attached Clover Background Wallpaper */
            background-image: url('HD-wallpaper-lucky-clover-beautiful-green-life-love-luck-nature.jpg'); 
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-color: #1b5e20; /* Fallback deep green */
        }
        
        /* Ultra-Transparent Glassmorphism Container */
        .calc-box { 
            background: rgba(255, 255, 255, 0.25); 
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            padding: 35px; 
            border-radius: 16px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.35); 
            text-align: center; 
            width: 320px;
            position: relative; 
            padding-top: 65px; 
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        
        /* Mode Button (Top Left) */
        .mode-btn {
            position: absolute;
            top: 15px;
            left: 20px;
            padding: 6px 14px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: bold;
            cursor: pointer;
            user-select: none;
            color: white;
            border: none;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            transition: background-color 0.2s ease;
        }
        
        /* Button Theme Colors */
        .bg-green { background-color: #2e7d32; }
        .bg-green:hover { background-color: #1b5e20; }
        .bg-blue { background-color: #1a73e8; }
        .bg-blue:hover { background-color: #1557b0; }
        
        /* Solid Black Bold Settings Icon (Top Right) */
        .settings-toggle {
            position: absolute;
            top: 16px;
            right: 22px;
            width: 22px;
            height: 22px;
            cursor: pointer;
            user-select: none;
            transition: transform 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .settings-toggle svg {
            fill: #000000; /* Pure Black fill */
            stroke: #000000; /* Extra bold weighting outline */
            stroke-width: 1.5px;
            filter: drop-shadow(0px 1px 1px rgba(255, 255, 255, 0.5));
        }
        .settings-toggle:hover {
            transform: scale(1.15) rotate(30deg);
        }
        
        /* Floating Modal Overlay */
        .modal-overlay {
            display: none; 
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.55); 
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        
        /* Floating Settings Card Box */
        .settings-panel {
            background: white;
            border-radius: 12px;
            padding: 24px;
            width: 260px;
            text-align: left;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.3);
            position: relative;
        }
        
        /* Floating Close Button 'X' */
        .close-btn {
            position: absolute;
            top: 12px;
            right: 16px;
            font-size: 18px;
            color: #8a8d91;
            cursor: pointer;
            font-weight: bold;
            user-select: none;
        }
        .close-btn:hover {
            color: #1c1e21;
        }
        
        .settings-panel label {
            font-size: 11px;
            color: #65676b;
            margin-bottom: 8px;
            display: block;
            font-weight: 600;
            text-transform: uppercase;
        }
        .settings-panel input {
            font-size: 18px;
            padding: 8px;
            text-align: center;
            width: 100%;
            border: 2px solid #e4e6eb;
            border-radius: 6px;
            box-sizing: border-box;
            outline: none;
            margin-bottom: 15px;
        }
        .settings-panel input:focus {
            border-color: #007aff;
        }

        /* Save Button */
        .btn-save {
            width: 100%;
            padding: 10px 0;
            border-radius: 6px;
            font-size: 13px;
            font-weight: bold;
            cursor: pointer;
            border: none;
            text-align: center;
            text-transform: uppercase;
            background-color: #2e7d32;
            color: white;
        }
        .btn-save:hover { background-color: #1b5e20; }

        /* Displays layout */
        .result-label {
            font-size: 11px;
            color: #000000; 
            margin-bottom: 5px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            text-shadow: 0px 1px 1px rgba(255, 255, 255, 0.4);
        }
        .result { 
            font-size: 42px; 
            font-weight: 900; 
            color: #000000; 
            min-height: 52px; 
            line-height: 52px;
            margin-bottom: 5px;
            text-shadow: 0px 1px 3px rgba(255, 255, 255, 0.8);
        }
        .divider {
            height: 1px;
            background-color: rgba(0, 0, 0, 0.25);
            margin: 20px 0;
        }
        label.input-label { 
            display: block; 
            font-size: 13px; 
            color: #000000; 
            margin-bottom: 10px; 
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            text-shadow: 0px 1px 1px rgba(255, 255, 255, 0.4);
        }
        .main-input { 
            font-size: 28px; 
            padding: 12px; 
            width: 100%; 
            text-align: center; 
            border: 2px solid rgba(0, 0, 0, 0.25); 
            border-radius: 8px; 
            box-sizing: border-box;
            outline: none;
            background: rgba(255, 255, 255, 0.8); 
            color: #000000;
            font-weight: 700;
            transition: border-color 0.2s, background-color 0.2s;
        }
        .main-input:focus {
            border-color: #007aff;
            background: rgba(255, 255, 255, 0.98);
        }
    </style>
</head>
<body>

<div class="calc-box">
    <button class="mode-btn bg-green" id="modeBtn" onclick="toggleMode()">
        ðŸª™ PESO TO (â‚±) COIN
    </button>
    
    <span class="settings-toggle" onclick="openSettings()">
        <svg viewBox="0 0 24 24" width="22" height="22" xmlns="http://www.w3.org/2000/svg">
            <path d="M19.43 12.98c.04-.32.07-.64.07-.98s-.03-.66-.07-.98l2.11-1.65c.19-.15.24-.42.12-.64l-2-3.46c-.12-.22-.39-.3-.61-.22l-2.49 1c-.52-.4-1.08-.73-1.69-.98l-.38-2.65C14.46 2.18 14.25 2 14 2h-4c-.25 0-.46.18-.49.42l-.38 2.65c-.61.25-1.17.59-1.69.98l-2.49-1c-.23-.09-.49 0-.61.22l-2 3.46c-.13.22-.07.49.12.64l2.11 1.65c-.04.32-.07.65-.07.98s.03.66.07.98l-2.11 1.65c-.19.15-.24.42-.12.64l2 3.46c.12.22.39.3.61.22l2.49-1c.52.4 1.08.73 1.69.98l.38 2.65c.03.24.24.42.49.42h4c.25 0 .46-.18.49-.42l.38-2.65c.61-.25 1.17-.59 1.69-.98l2.49 1c.23.09.49 0 .61-.22l2-3.46c.12-.22.07-.49-.12-.64l-2.11-1.65zM12 15.5c-1.93 0-3-1.57-3-3.5s1.07-3.5 3-3.5 3 1.57 3 3.5-1.07 3.5-3 3.5z"/>
        </svg>
    </span>

    <div class="result-label" id="resLabel">COINS OUT (ROUNDED DOWN)</div>
    <div class="result" id="outputVal">â€”</div>
    
    <div class="divider"></div>
    
    <label for="inputVal" class="input-label" id="inpLabel">Enter Pesos (â‚±)</label>
    <input type="number" id="inputVal" class="main-input" placeholder="0" oninput="calculate()" autofocus>
</div>

<div class="modal-overlay" id="modalOverlay">
    <div class="settings-panel">
        <span class="close-btn" onclick="closeSettings()">âœ•</span>
        <label for="divisorVal">Modify Divisor Rule:</label>
        <input type="number" id="divisorVal" value="62.6" step="0.1">
        
        <button class="btn-save" onclick="saveSettings()">Save Changes</button>
    </div>
</div>

<script>
let isPesoToCoin = true;
let activeDivisor = 62.6;

function openSettings() {
    document.getElementById('divisorVal').value = activeDivisor;
    document.getElementById('modalOverlay').style.display = 'flex';
}

function closeSettings() {
    document.getElementById('modalOverlay').style.display = 'none';
}

function saveSettings() {
    let inputDivisor = parseFloat(document.getElementById('divisorVal').value);
    
    if (!isNaN(inputDivisor) && inputDivisor !== 0) {
        activeDivisor = inputDivisor;
        calculate();
        closeSettings();
    } else {
        alert("Please enter a valid divisor number.");
    }
}

function toggleMode() {
    isPesoToCoin = !isPesoToCoin;
    
    let modeBtn = document.getElementById('modeBtn');
    let resLabel = document.getElementById('resLabel');
    let inpLabel = document.getElementById('inpLabel');
    let inputVal = document.getElementById('inputVal');
    
    if (isPesoToCoin) {
        modeBtn.className = "mode-btn bg-green";
        modeBtn.innerText = "(â‚±) PESO TO ðŸª™ COIN";
        resLabel.innerText = "COINS OUT (ROUNDED DOWN)";
        inpLabel.innerText = "Enter Pesos (â‚±)";
    } else {
        modeBtn.className = "mode-btn bg-blue";
        modeBtn.innerText = "ðŸª™ COIN TO (â‚±) PESO";
        resLabel.innerText = "PESOS OUT (ROUNDED UP)";
        inpLabel.innerText = "Enter Coins (ðŸª™)";
    }
    
    inputVal.value = "";
    calculate();
}

function calculate() {
    let x = parseFloat(document.getElementById('inputVal').value);
    let output = document.getElementById('outputVal');
    
    if (isNaN(x) || isNaN(activeDivisor) || activeDivisor === 0 || x <= 0) {
        output.innerText = "â€”";
        return;
    }
    
    let rawResult = 0;
    let finalResult = 0;
    
    if (isPesoToCoin) {
        rawResult = (x / activeDivisor) * 10000;
        finalResult = Math.floor(rawResult / 100) * 100;
    } else {
        rawResult = (x / 10000) * activeDivisor;
        finalResult = Math.ceil(rawResult);
    }
    
    output.innerText = finalResult.toLocaleString();
}
</script>

</body>
</html>
